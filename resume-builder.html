<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder - Hovix AI</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  padding:30px;
}

.container{
  max-width:800px;
  margin:auto;
}

h1{
  text-align:center;
  margin-bottom:20px;
}

input, textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:none;
}

button{
  background:#2563eb;
  color:white;
  padding:12px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:10px;
}

.output{
  background:white;
  color:black;
  padding:20px;
  margin-top:20px;
  border-radius:10px;
  white-space:pre-line;
}
</style>
</head>

<body>

<div class="container">

<h1>Resume Builder</h1>

<input id="name" placeholder="Your Name">
<input id="job" placeholder="Job Title">
<textarea id="skills" placeholder="Skills (comma separated)"></textarea>
<textarea id="exp" placeholder="Experience"></textarea>

<button onclick="generate()">Generate Resume</button>

<div class="output" id="output"></div>

</div>

<script>
function generate(){

let name = document.getElementById("name").value;
let job = document.getElementById("job").value;
let skills = document.getElementById("skills").value;
let exp = document.getElementById("exp").value;

document.getElementById("output").innerText = 
`NAME: ${name}

JOB: ${job}

SKILLS:
${skills}

EXPERIENCE:
${exp}`;
}
</script>

</body>
</html>
